name: Build OpenSSL Static Libraries

on:
  workflow_dispatch:
    inputs:
      openssl_version:
        description: 'OpenSSL version'
        required: true
        default: '3.4'

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows static-md — C++/CLI .NET Framework (no ARM64)
          - os: windows-latest
            triplet: x86-windows-static-md
            arch: x86
            platform: windows-md
          - os: windows-latest
            triplet: x64-windows-static-md
            arch: x64
            platform: windows-md
          # Windows static — CMake native
          - os: windows-latest
            triplet: x86-windows-static
            arch: x86
            platform: windows
          - os: windows-latest
            triplet: x64-windows-static
            arch: x64
            platform: windows
          - os: windows-latest
            triplet: arm64-windows-static
            arch: arm64
            platform: windows
          # Linux
          - os: ubuntu-latest
            triplet: x64-linux
            arch: x64
            platform: linux
          - os: ubuntu-latest
            triplet: arm64-linux
            arch: arm64
            platform: linux
          - os: ubuntu-latest
            triplet: arm-linux
            arch: arm
            platform: linux
          # macOS
          - os: macos-26
            triplet: arm64-osx
            arch: arm64
            platform: osx
          - os: macos-26-intel
            triplet: x64-osx
            arch: x64
            platform: osx

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Export GHA cache environment variables
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Get latest vcpkg commit
        id: vcpkg-commit
        shell: bash
        run: |
          COMMIT=$(git ls-remote https://github.com/microsoft/vcpkg.git HEAD | cut -f1)
          echo "sha=$COMMIT" >> $GITHUB_OUTPUT

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ steps.vcpkg-commit.outputs.sha }}

      - name: Create static overlay triplets
        if: matrix.platform == 'linux' || matrix.platform == 'osx'
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/triplets
          
          if [ "${{ matrix.platform }}" = "osx" ]; then
            SYSTEM_NAME="Darwin"
          else
            SYSTEM_NAME="Linux"
          fi
          
          cat > ${{ github.workspace }}/triplets/${{ matrix.triplet }}.cmake << EOF
          set(VCPKG_TARGET_ARCHITECTURE ${{ matrix.arch }})
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE static)
          set(VCPKG_CMAKE_SYSTEM_NAME $SYSTEM_NAME)
          EOF

      - name: Install cross-compile toolchain (Linux ARM)
        if: matrix.platform == 'linux' && matrix.arch == 'arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Install cross-compile toolchain (Linux ARM64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build OpenSSL (Windows / Windows-md)
        if: matrix.platform == 'windows' || matrix.platform == 'windows-md'
        shell: pwsh
        run: |
          vcpkg install openssl:${{ matrix.triplet }} `
            --x-buildtrees-root=${{ runner.temp }}/vcpkg-buildtrees

      - name: Build OpenSSL (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          vcpkg install openssl:${{ matrix.triplet }} \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-buildtrees-root=${{ runner.temp }}/vcpkg-buildtrees

      - name: Build OpenSSL (macOS)
        if: matrix.platform == 'osx'
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "14.0"
        run: |
          vcpkg install openssl:${{ matrix.triplet }} \
            --overlay-triplets=${{ github.workspace }}/triplets \
            --x-buildtrees-root=${{ runner.temp }}/vcpkg-buildtrees

      - name: Collect libs (Windows / Windows-md)
        if: matrix.platform == 'windows' || matrix.platform == 'windows-md'
        shell: pwsh
        run: |
          $dst = "third_party/openssl/${{ matrix.platform }}/${{ matrix.arch }}"
          New-Item -ItemType Directory -Force $dst
          $src = "$env:VCPKG_ROOT/installed/${{ matrix.triplet }}"
          Copy-Item "$src/lib/libssl.lib"    $dst
          Copy-Item "$src/lib/libcrypto.lib" $dst
          $inc = "third_party/openssl/include/${{ matrix.platform }}/openssl"
          if (-not (Test-Path $inc)) {
            New-Item -ItemType Directory -Force "third_party/openssl/include/${{ matrix.platform }}"
            Copy-Item "$src/include/openssl" "third_party/openssl/include/${{ matrix.platform }}/" -Recurse -Force
          }
          # configuration.h arch-specific
          $archInc = "third_party/openssl/include/${{ matrix.platform }}/${{ matrix.arch }}/openssl"
          New-Item -ItemType Directory -Force $archInc
          Copy-Item "$src/include/openssl/configuration.h" "$archInc/" -Force

      - name: Collect libs (Linux/macOS)
        if: matrix.platform == 'linux' || matrix.platform == 'osx'
        shell: bash
        run: |
          DST="third_party/openssl/${{ matrix.platform }}/${{ matrix.arch }}"
          mkdir -p "$DST"
          SRC="$VCPKG_ROOT/installed/${{ matrix.triplet }}"
          cp "$SRC/lib/libssl.a"    "$DST/"
          cp "$SRC/lib/libcrypto.a" "$DST/"
          INC="third_party/openssl/include/${{ matrix.platform }}/openssl"
          if [ ! -d "$INC" ]; then
            mkdir -p "third_party/openssl/include/${{ matrix.platform }}"
            cp -r "$SRC/include/openssl" "third_party/openssl/include/${{ matrix.platform }}/"
          fi
          # configuration.h arch-specific
          ARCH_INC="third_party/openssl/include/${{ matrix.platform }}/${{ matrix.arch }}/openssl"
          mkdir -p "$ARCH_INC"
          cp "$SRC/include/openssl/configuration.h" "$ARCH_INC/"

      - name: Upload libs artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-libs-${{ matrix.platform }}-${{ matrix.arch }}
          path: third_party/openssl/${{ matrix.platform }}/
          retention-days: 1
          compression-level: 9

      - name: Upload headers artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-headers-${{ matrix.platform }}
          path: third_party/openssl/include/
          retention-days: 1
          compression-level: 9

  open-pr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: third_party/openssl/
          merge-multiple: true

      - name: Verify headers integrity
        shell: bash
        run: |
          ERRORS=0
          for platform in windows windows-md linux osx; do
            DIR="third_party/openssl/include/$platform/openssl"
            if [ -d "$DIR" ]; then
              while IFS= read -r f; do
                # File vuoto — sicuramente corrotto
                if [ ! -s "$f" ]; then
                  echo "EMPTY: $f"
                  ERRORS=$((ERRORS + 1))
                  continue
                fi
                LAST=$(tail -1 "$f")
                if [[ "$LAST" == *\\ ]]; then
                  echo "TRUNCATED mid-line: $f (last line: '$LAST')"
                  ERRORS=$((ERRORS + 1))
                fi
              done < <(find "$DIR" -name "*.h")
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS corrupted header files — aborting PR"
            exit 1
          fi
          echo "All headers OK"

      - name: Verify binary integrity
        shell: bash
        run: |
          ERRORS=0
          for platform in linux osx; do
            for arch in x64 x86 arm arm64; do
              for lib in libssl libcrypto; do
                f="third_party/openssl/$platform/$arch/$lib.a"
                if [ -f "$f" ]; then
                  if ! ar t "$f" > /dev/null 2>&1; then
                    echo "CORRUPTED: $f"
                    ERRORS=$((ERRORS + 1))
                  fi
                fi
              done
            done
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS corrupted libraries — aborting PR"
            exit 1
          fi
          echo "All libraries OK"

      - name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: openssl-static-${{ github.event.inputs.openssl_version }}-${{ github.run_id }}
          commit-message: "chore: OpenSSL ${{ github.event.inputs.openssl_version }} static libs (all platforms)"
          title: "OpenSSL ${{ github.event.inputs.openssl_version }} static libs"
          body: |
            Automated build from workflow #${{ github.run_id }}.
            Contains static libraries for all platforms and architectures.

            | Platform | Architectures |
            |---|---|
            | Windows (static) | x86, x64, arm64 |
            | Windows (static-md) | x86, x64 |
            | Linux | x64, arm, arm64 |
            | macOS | x64, arm64 |
          labels: dependencies